<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rgb(108, 207, 235);">
    <h1 style="text-align: center; color: blue; text-underline-position: below;">Institute of Technology</h1>
    <h2 style="text-align: center; color: green;">Student Register Form</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/35/A2_Seal.jpg" alt="Institute of Technology" style="display: block; margin-left: auto; margin-right: auto; width: 10%;">
<br>
    <table style="margin-left: auto; width: 80%; margin-right: auto; border: 4px solid black; padding: 10px; background-color: rgb(146, 222, 127);">
    <tr>
        <td style="padding: 10px;">Student ID:</td>
        <td><input type="number" name="student_id" placeholder="Enter Student ID"></td>
    </tr>
    <tr>
        <td style="padding: 10px;">Student Name:</td>
        <td><input type="text" name="first_name" placeholder="Enter First Name"></td>
        <td style="padding: 10px;">Last Name:</td>
        <td><input type="text" name="last_name" placeholder="Enter Last Name"></td>
    </tr>
    <tr>
        <td style="padding: 10px;">Email:</td>
        <td><input type="email" name="email" placeholder="Enter Email"></td>
    </tr>
    <tr>
        <td style="padding: 10px;">Date of Birth:</td>
        <td><input type="date" name="date_of_birth" placeholder="DD-MM-YY"></td>
        <td style="padding: 10px;">(DD-MM-YY)</td>
    </tr>
    <tr>
        <td style="padding: 10px;">Gender:</td>
        <td><input type="radio" name="gender" value="Male"> Male <input type="radio" name="gender" value="Female"> Female</td>
    </tr>
    <tr>
        <td style="padding: 10px;">Course:</td>
        <td><select name="course">
            <option value="B.Tech">B.Tech</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MBA">MBA</option>
            <option value="PhD">PhD</option>
        </select></td>
    </tr>

    <tr>
        <td style="padding: 10px;">Address:</td>
        <td><textarea name="address" rows="4" cols="50"></textarea></td>
    </tr>

    <tr>
        <td style="padding: 10px;">Phone Number:</td>
        <td><input type="tel" name="phone_number" placeholder="Enter Phone Number"></td>
    </tr>

    <tr>
        <td style="padding: 10px;">Education Qualification:</td>
        <td><input type="radio" name="education_qualification" value="High School"> High School <input type="radio" name="education_qualification" value="Bachelor"> Bachelor <input type="radio" name="education_qualification" value="Master"> Master</td>
    </tr>

    <tr>
        <td style="padding: 10px;">Upload Photo:</td>
        <td><input type="file" name="photo"></td>
    </tr>


    <tr>
        <td style="padding: 10px;">Additional Information:</td>
        <td><textarea name="additional_info" rows="4" cols="50"></textarea></td>
    </tr>

        <tr>
            <td></td>
            <td><input type="submit" value="Register"></td>
        </tr>


</body>
</html>
